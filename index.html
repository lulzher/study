
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { max-width: 480px; margin: 0 auto; padding: 2rem 1rem; }
.quote-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 2rem; position: relative; }
.quote-text { font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; font-style: italic; }
.quote-author { font-size: 12px; color: var(--color-text-tertiary); margin-top: 6px; text-align: right; }
.quote-refresh { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 14px; padding: 4px; line-height: 1; }
.quote-refresh:hover { color: var(--color-text-primary); }
.mode-tabs { display: flex; gap: 4px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 4px; margin-bottom: 2rem; }
.mode-tab { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; border-radius: 6px; cursor: pointer; color: var(--color-text-secondary); border: none; background: transparent; transition: all 0.15s; }
.mode-tab.active { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.timer-display { text-align: center; margin-bottom: 2rem; }
.timer-ring-wrap { display: inline-block; position: relative; margin-bottom: 1.5rem; }
.timer-ring-wrap svg { display: block; }
.timer-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
.timer-time .t-min { font-size: 42px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -2px; line-height: 1; }
.timer-time .t-label { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }
.session-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 2rem; }
.ctrl-btn { width: 48px; height: 48px; border-radius: 50%; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--color-text-primary); transition: all 0.15s; }
.ctrl-btn:hover { background: var(--color-background-secondary); }
.ctrl-btn.primary { width: 60px; height: 60px; font-size: 22px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; }
.ctrl-btn.primary:hover { opacity: 0.85; }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.stat-lbl { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.session-dots { display: flex; justify-content: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); transition: background 0.3s; }
.dot.done { background: var(--color-text-primary); }
.dot.rest { background: var(--color-border-secondary); opacity: 0.4; }
.setting-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.setting-row:last-child { border-bottom: none; }
.setting-label { flex: 1; font-size: 14px; color: var(--color-text-primary); }
.setting-sub { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.num-ctrl { display: flex; align-items: center; gap: 8px; }
.num-btn { width: 28px; height: 28px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); }
.num-val { font-size: 14px; font-weight: 500; min-width: 28px; text-align: center; color: var(--color-text-primary); }
</style>

<h2 class="sr-only">공부 집중 타이머 — 뽀모도로 방식 타이머, 명언, 순공시간 기록</h2>

<div class="wrap">
  <div class="quote-box" id="quoteBox">
    <button class="quote-refresh" id="quoteRefreshBtn" aria-label="명언 새로 보기"><i class="ti ti-refresh" aria-hidden="true"></i></button>
    <p class="quote-text" id="quoteText">지금 이 순간이 당신이 가진 전부입니다. 오늘 할 수 있는 일을 내일로 미루지 마세요.</p>
    <p class="quote-author" id="quoteAuthor">— 마르쿠스 아우렐리우스</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-tab="timer" id="tabTimer">타이머</button>
    <button class="mode-tab" data-tab="stats" id="tabStats">순공시간</button>
    <button class="mode-tab" data-tab="settings" id="tabSettings">설정</button>
  </div>

  <div id="panelTimer">
    <div class="timer-display">
      <div class="timer-ring-wrap">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="88" fill="none" stroke="var(--color-border-tertiary)" stroke-width="6"/>
          <circle id="progressRing" cx="100" cy="100" r="88" fill="none" stroke="var(--color-text-primary)" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="552.9" stroke-dashoffset="0" transform="rotate(-90 100 100)"
            style="transition: stroke-dashoffset 0.8s ease, stroke 0.3s;"/>
        </svg>
        <div class="timer-time">
          <div class="t-min" id="timerDisplay">25:00</div>
          <div class="t-label" id="timerLabel">집중</div>
        </div>
      </div>
      <div class="session-label" id="sessionLabel">세션 1 / 4</div>
      <div class="session-dots" id="sessionDots"></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btnReset" aria-label="초기화"><i class="ti ti-player-skip-back" aria-hidden="true"></i></button>
      <button class="ctrl-btn primary" id="btnPlay" aria-label="시작/일시정지"><i class="ti ti-player-play" aria-hidden="true"></i></button>
      <button class="ctrl-btn" id="btnSkip" aria-label="건너뛰기"><i class="ti ti-player-skip-forward" aria-hidden="true"></i></button>
    </div>
  </div>

  <div id="panelStats" style="display:none;">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="statTotal">0h 0m</div>
        <div class="stat-lbl">오늘 순공</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statSessions">0</div>
        <div class="stat-lbl">완료 세션</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statStreak">0</div>
        <div class="stat-lbl">연속 일수</div>
      </div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem;">
      <div style="font-size: 13px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-primary);">오늘의 집중 기록</div>
      <div id="logList" style="font-size: 13px; color: var(--color-text-tertiary); line-height: 2;">기록 없음</div>
    </div>
    <div style="margin-top: 12px; text-align: right;">
      <button class="ctrl-btn" style="width: auto; height: auto; border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 13px; border-radius: 8px;" id="btnClearLog">기록 초기화</button>
    </div>
  </div>

  <div id="panelSettings" style="display:none;">
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 0 1.25rem;">
      <div class="setting-row">
        <div><div class="setting-label">집중 시간</div></div>
        <div class="num-ctrl">
          <button class="num-btn" data-key="focus" data-dir="-1">−</button>
          <div class="num-val" id="setFocus">25</div>
          <button class="num-btn" data-key="focus" data-dir="1">+</button>
          <span style="font-size:12px; color:var(--color-text-tertiary);">분</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">짧은 휴식</div></div>
        <div class="num-ctrl">
          <button class="num-btn" data-key="short" data-dir="-1">−</button>
          <div class="num-val" id="setShort">5</div>
          <button class="num-btn" data-key="short" data-dir="1">+</button>
          <span style="font-size:12px; color:var(--color-text-tertiary);">분</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">긴 휴식</div></div>
        <div class="num-ctrl">
          <button class="num-btn" data-key="long" data-dir="-1">−</button>
          <div class="num-val" id="setLong">15</div>
          <button class="num-btn" data-key="long" data-dir="1">+</button>
          <span style="font-size:12px; color:var(--color-text-tertiary);">분</span>
        </div>
      </div>
      <div class="setting-row">
        <div><div class="setting-label">세션 수</div><div class="setting-sub">긴 휴식 전 집중 횟수</div></div>
        <div class="num-ctrl">
          <button class="num-btn" data-key="sessions" data-dir="-1">−</button>
          <div class="num-val" id="setSessions">4</div>
          <button class="num-btn" data-key="sessions" data-dir="1">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const quotes = [
  { text: "지금 이 순간이 당신이 가진 전부입니다. 오늘 할 수 있는 일을 내일로 미루지 마세요.", author: "마르쿠스 아우렐리우스" },
  { text: "천 리 길도 한 걸음부터.", author: "노자" },
  { text: "성공은 매일 반복되는 작은 노력들의 합입니다.", author: "로버트 콜리어" },
  { text: "당신이 할 수 있다고 생각하든, 없다고 생각하든 — 당신이 옳습니다.", author: "헨리 포드" },
  { text: "오늘 힘들고 싫어도 해야 한다면, 내일은 더 쉬워집니다.", author: "아놀드 베넷" },
  { text: "집중은 내가 원하는 것을 말하는 것이 아니라 원하지 않는 것에 아니오라고 말하는 것입니다.", author: "스티브 잡스" },
  { text: "우리가 두려워해야 할 것은 실패가 아니라 시작조차 하지 않는 것입니다.", author: "T.S. 엘리엇" },
  { text: "재능은 연습 없이는 아무것도 아닙니다.", author: "볼프강 모차르트" },
  { text: "불가능이란 말은 작은 사람들의 사전에나 있는 것입니다.", author: "나폴레옹 보나파르트" },
  { text: "지식에 투자하면 항상 최고의 이자를 받습니다.", author: "벤자민 프랭클린" },
];
let qIdx = 0;
function showQuote(i) {
  const q = quotes[i % quotes.length];
  document.getElementById('quoteText').textContent = q.text;
  document.getElementById('quoteAuthor').textContent = '— ' + q.author;
}
document.getElementById('quoteRefreshBtn').addEventListener('click', () => { qIdx = (qIdx + 1) % quotes.length; showQuote(qIdx); });

const cfg = { focus: 25, short: 5, long: 15, sessions: 4 };
let state = { running: false, mode: 'focus', session: 1, secondsLeft: cfg.focus * 60, interval: null, focusDone: 0, totalFocusSec: 0, logs: [] };
const CIRC = 2 * Math.PI * 88;

function fmt(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function modeTotal() {
  if (state.mode === 'focus') return cfg.focus * 60;
  if (state.mode === 'short') return cfg.short * 60;
  return cfg.long * 60;
}
function updateRing() {
  const total = modeTotal();
  const frac = state.secondsLeft / total;
  const ring = document.getElementById('progressRing');
  ring.setAttribute('stroke-dashoffset', String(CIRC * (1 - frac)));
  ring.style.stroke = state.mode === 'focus' ? 'var(--color-text-primary)' : '#888';
}
function updateDisplay() {
  document.getElementById('timerDisplay').textContent = fmt(state.secondsLeft);
  const labels = { focus: '집중', short: '짧은 휴식', long: '긴 휴식' };
  document.getElementById('timerLabel').textContent = labels[state.mode];
  document.getElementById('sessionLabel').textContent = '세션 ' + state.session + ' / ' + cfg.sessions;
  updateRing();
  updateDots();
}
function updateDots() {
  const c = document.getElementById('sessionDots');
  c.innerHTML = '';
  for (let i = 1; i <= cfg.sessions; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.session ? ' done' : '');
    c.appendChild(d);
  }
}
function nextPhase() {
  if (state.mode === 'focus') {
    state.focusDone++;
    state.totalFocusSec += cfg.focus * 60;
    const now = new Date();
    state.logs.push(now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ' — 집중 ' + cfg.focus + '분 완료');
    updateStats();
    if (state.focusDone % cfg.sessions === 0) {
      state.mode = 'long'; state.session = 1;
    } else {
      state.mode = 'short'; state.session = Math.min(state.session + 1, cfg.sessions);
    }
  } else {
    state.mode = 'focus';
  }
  state.secondsLeft = modeTotal();
  updateDisplay();
}
function tick() {
  if (state.secondsLeft > 0) {
    state.secondsLeft--;
    updateDisplay();
  } else {
    nextPhase();
  }
}
function togglePlay() {
  const btn = document.getElementById('btnPlay');
  if (state.running) {
    clearInterval(state.interval); state.running = false;
    btn.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i>';
  } else {
    state.interval = setInterval(tick, 1000); state.running = true;
    btn.innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i>';
  }
}
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnReset').addEventListener('click', () => {
  clearInterval(state.interval); state.running = false;
  state.mode = 'focus'; state.secondsLeft = cfg.focus * 60;
  document.getElementById('btnPlay').innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i>';
  updateDisplay();
});
document.getElementById('btnSkip').addEventListener('click', () => { nextPhase(); });

function updateStats() {
  const h = Math.floor(state.totalFocusSec / 3600);
  const m = Math.floor((state.totalFocusSec % 3600) / 60);
  document.getElementById('statTotal').textContent = h + 'h ' + m + 'm';
  document.getElementById('statSessions').textContent = state.focusDone;
  const logs = state.logs;
  document.getElementById('logList').innerHTML = logs.length ? logs.slice(-8).reverse().map(l => '<div>' + l + '</div>').join('') : '기록 없음';
}
document.getElementById('btnClearLog').addEventListener('click', () => {
  state.logs = []; state.totalFocusSec = 0; state.focusDone = 0;
  updateStats();
  document.getElementById('statStreak').textContent = '0';
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    ['timer','stats','settings'].forEach(p => {
      document.getElementById('panel' + p.charAt(0).toUpperCase() + p.slice(1)).style.display = tab.dataset.tab === p ? '' : 'none';
    });
    if (tab.dataset.tab === 'stats') updateStats();
  });
});

document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.key, dir = parseInt(btn.dataset.dir);
    const mins = { focus: [5,60], short: [1,30], long: [5,60], sessions: [2,8] };
    const [mn, mx] = mins[key];
    cfg[key] = Math.min(mx, Math.max(mn, cfg[key] + dir));
    const ids = { focus: 'setFocus', short: 'setShort', long: 'setLong', sessions: 'setSessions' };
    document.getElementById(ids[key]).textContent = cfg[key];
    if (!state.running) { state.secondsLeft = modeTotal(); updateDisplay(); }
  });
});

updateDisplay();
</script>
